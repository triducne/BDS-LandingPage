    <title>Cảm ơn - Trí Đức Realty</title>
<link rel="canonical" href="https://triducrealty.com/thank-you.html">

    <meta name="description" content="Cảm ơn bạn đã đăng ký nhận bảng giá. Trí Đức Realty sẽ liên hệ lại trong thời gian sớm nhất.">
    <meta name="theme-color" content="#111111">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/project.css">
    <style>
        .thank-you-page .section {
            padding: 2.5rem 1rem;
        }
        .thank-you-page .card {
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem 2rem;
            border-radius: 1.6rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.12);
        }
        .thank-you-page .title {
            font-size: clamp(2.1rem, 6.2vw, 3rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
        }
        .thank-you-page .section-note,
        .thank-you-page .card p {
            font-size: 1rem;
        }
        .thank-you-page .d-flex {
            gap: 1rem;
        }
        .thank-you-page .btn-gold {
            min-width: 180px;
            padding: 0.95rem 1.8rem;
        }
        @media (max-width: 768px) {
            .thank-you-page .card {
                padding: 2.2rem 1.4rem;
            }
            .thank-you-page .section {
                padding: 2rem 0.75rem;
            }
        }
        @media (max-width: 576px) {
            .thank-you-page .card {
                padding: 1.75rem 1rem;
                border-radius: 1.2rem;
                text-align: center;
            }
            .thank-you-page .card .title,
            .thank-you-page .card p {
                text-align: center;
            }
            .thank-you-page .d-flex {
                flex-direction: column;
                align-items: stretch;
            }
            .thank-you-page .btn-gold {
                width: 100%;
                max-width: 100%;
            }
            .thank-you-page .section-note,
            .thank-you-page .card p {
                font-size: 0.98rem;
            }
        }
    </style>
</head>

<body class="thank-you-page">
    <section class="section py-5 bg-light">
        <div class="container text-center">
            <div class="card shadow-sm rounded-4 p-5">
                <div class="mb-4">
                    <i class="fa-solid fa-circle-check fa-4x text-success"></i>
                </div>
                <h1 id="thankTitle" class="title">CẢM ƠN ANH/CHỊ!</h1>
                <p class="section-note mb-4">Yêu cầu của anh/chị đã được tiếp nhận thành công.</p>
                <p class="mb-4">Trí Đức Realty sẽ liên hệ trong thời gian sớm nhất để gửi bảng giá và tư vấn chi tiết cho dự án <span id="projectName">của anh/chị</span>.</p>
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a href="index.html" class="btn btn-gold btn-lg">Về trang chủ</a>
                    <a id="backButton" href="index.html" class="btn btn-gold btn-lg">Quay lại dự án</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const params = new URLSearchParams(window.location.search);
        const project = params.get('project');
        const returnUrl = params.get('returnUrl') || 'index.html';

        const projectName = document.getElementById('projectName');
        const thankTitle = document.getElementById('thankTitle');
        const backButton = document.getElementById('backButton');

        if (projectName) projectName.textContent = project ? project : 'của anh/chị';
        if (thankTitle && project) thankTitle.textContent = `Cảm ơn anh/chị đã đăng ký ${project}`;
        if (backButton) {
            backButton.href = returnUrl;
            backButton.textContent = project ? `Quay lại ${project}` : 'Quay lại dự án';
        }
    </script>
</body>

</html>
