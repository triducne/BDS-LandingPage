<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#f6d365"/>
      <stop offset="1" stop-color="#fda085"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="#0b0b0b" />
  <rect x="40" y="40" width="1120" height="620" rx="28" fill="url(#g)" opacity="0.12" />
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="1040" height="540" rx="20" fill="#071022" opacity="0.92" />
    <text x="48" y="80" fill="#ffd77e" font-family="Poppins, sans-serif" font-size="40" font-weight="800">PTTC - Giãn tiến độ (36 tháng)</text>
    <text x="48" y="140" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Áp dụng giới hạn: 100 sản phẩm</text>
    <text x="48" y="170" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Thanh toán trong 36 tháng, nhiều đợt nhỏ để giảm áp lực dòng tiền</text>
    <text x="48" y="200" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Đợt lớn: Đặt cọc 50 triệu, ký TTĐC và HĐMB trong 10 ngày</text>
    <text x="48" y="230" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Đợt cuối nhận bàn giao: 10% (bao gồm VAT)</text>
    <text x="48" y="260" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- KPBT: 2% thanh toán khi có thông báo bàn giao</text>
    <text x="48" y="300" fill="#e8d7b6" font-family="Poppins, sans-serif" font-size="18">Lưu ý: Chương trình có giới hạn số lượng và có thể kết thúc sớm.</text>
  </g>
  <g transform="translate(900,520)">
    <text x="0" y="0" fill="#888" font-family="Poppins, sans-serif" font-size="12">Trí Đức Realty — The Win City</text>
  </g>
</svg>
