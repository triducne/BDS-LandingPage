    <text x="48" y="80" fill="#9fd1ff" font-family="Poppins, sans-serif" font-size="40" font-weight="800">Vay ngân hàng — Hỗ trợ & Ưu đãi</text>
    <text x="48" y="140" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Voucher 20.000.000 VNĐ (áp dụng 100 sản phẩm đầu tiên)</text>
    <text x="48" y="170" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Hạn mức vay: lên đến 80% giá trị hợp đồng (bao gồm VAT)</text>
    <text x="48" y="200" fill="#fff" font-family="Poppins, sans-serif" font-size="20">- Cam kết/hỗ trợ lãi suất: lựa chọn 3.3% cố định hoặc hỗ trợ đến 7.6% trong 24 tháng</text>
