      <stop offset="1" stop-color="#c2e9fb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="#071022" />
  <rect x="40" y="40" width="1120" height="620" rx="28" fill="url(#g2)" opacity="0.10" />
  <g transform="translate(80,80)">
